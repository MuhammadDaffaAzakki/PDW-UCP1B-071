</html><!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Community - Form Pendaftaran</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">🌐 Tech Community</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">🏠 Beranda</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="form.html">📝 Daftar Anggota</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="gallery.html">🎨 Multimedia</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5 pt-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow-lg border-0">
                    <div class="card-header bg-success text-white text-center">
                        <h3 class="mb-0">Form Pendaftaran Anggota</h3>
                    </div>
                    <div class="card-body p-5">
                        <form id="memberForm">
                            <div class="row">
                                <div class="col-md-6 mb-4">
                                    <label for="nama" class="form-label fw-bold">Nama Lengkap</label>
                                    <input type="text" class="form-control form-control-lg" id="nama" required>
                                </div>
                                <div class="col-md-6 mb-4">
                                    <label for="email" class="form-label fw-bold">Email</label>
                                    <input type="email" class="form-control form-control-lg" id="email" required>
                                </div>
                            </div>
                            <div class="mb-4">
                                <label for="minat" class="form-label fw-bold">Bidang Minat</label>
                                <select class="form-select form-select-lg" id="minat" required>
                                    <option value="" disabled selected>Pilih bidang minat</option>
                                    <option value="Web Development">Web Development</option>
                                    <option value="Data Science">Data Science</option>
                                    <option value="Cybersecurity">Cybersecurity</option>
                                    <option value="UI/UX Design">UI/UX Design</option>
                                </select>
                            </div>
                            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                                <button type="button" class="btn btn-secondary btn-lg me-md-2" onclick="window.location.href='index.html'">
                                    Kembali
                                </button>
                                <button type="submit" class="btn btn-success btn-lg">Daftar Sekarang</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
