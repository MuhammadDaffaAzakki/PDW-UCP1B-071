<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran Tech Community</title>
</head>
<body>
    <h1>Daftar Sekarang</h1>
    <form action="submit_form.php" method="post">
        <label for="name">Nama:</label>
        <input type="text" id="name" name="name" required><br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required><br><br>

        <label for="interest">Bidang Minat:</label>
        <select id="interest" name="interest" required>
            <option value="" disabled selected>Pilih bidang minat</option>
            <option value="programming">Programming</option>
            <option value="hardware">Data Analysis</option>
            <option value="ai">Artificial Intelligence</option>
            <option value="cybersecurity">Cybersecurity</option>
        </select><br><br>


        <input type="submit" value="Daftar">
        <input type="button" value="Kembali" onclick="window.location.href='index.html'">
    </form>
</body>
</html>
